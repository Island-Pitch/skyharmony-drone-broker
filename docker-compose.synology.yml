services:
  app:
    build: .
    container_name: skyharmony-app
    ports:
      - "${APP_PORT:-50080}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DEMO_MODE=${DEMO_MODE:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      start-period: 10s
      retries: 3
    labels:
      - "com.islandpitch.project=skyharmony"
      - "com.islandpitch.role=demo"

  api:
    image: node:22-alpine
    container_name: skyharmony-api
    working_dir: /app
    volumes:
      - ./api:/app
      - api_data:/app/data
    ports:
      - "${API_PORT:-50081}:4000"
    command: ["node", "server.js"]
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=4000
      - DEMO_MODE=${DEMO_MODE:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 3s
      start-period: 10s
      retries: 3
    labels:
      - "com.islandpitch.project=skyharmony"
      - "com.islandpitch.role=demo"

volumes:
  api_data:
    driver: local

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skyharmony}
      POSTGRES_USER: ${POSTGRES_USER:-skyharmony}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyharmony"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-skyharmony}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-skyharmony}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-noreply@skyharmony.net}
      APP_URL: ${APP_URL:-http://localhost:50080}
      SEED_DATA: ${SEED_DATA:-false}
    command: >
      sh -c "
        npx drizzle-kit migrate &&
        if [ \"$$SEED_DATA\" = 'true' ]; then node dist/db/seed.js; fi &&
        node dist/index.js
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  app:
    build:
      context: .
      args:
        VITE_DEMO_MODE: "false"
    ports:
      - "50080:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:

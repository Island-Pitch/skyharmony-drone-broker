services:
  app:
    build: .
    ports:
      - "50080:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  api:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./api:/app
    ports:
      - "4000:4000"
    command: ["node", "server.js"]
    environment:
      - NODE_ENV=development
      - PORT=4000

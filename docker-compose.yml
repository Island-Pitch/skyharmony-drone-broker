services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: skyharmony
      POSTGRES_USER: skyharmony
      POSTGRES_PASSWORD: skyharmony_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyharmony"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://skyharmony:skyharmony_dev@db:5432/skyharmony
      JWT_SECRET: skyharmony-dev-secret
      PORT: 4000
      NODE_ENV: development

  app:
    build: .
    ports:
      - "50080:3000"
    depends_on:
      - api
    environment:
      NODE_ENV: production

volumes:
  pgdata:

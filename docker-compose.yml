services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: skyharmony
      POSTGRES_USER: skyharmony
      POSTGRES_PASSWORD: skyharmony_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyharmony"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://skyharmony:skyharmony_dev@db:5432/skyharmony
      JWT_SECRET: skyharmony-dev-secret
      PORT: 4000
      NODE_ENV: production
    command: >
      sh -c "
        npx drizzle-kit migrate &&
        node dist/db/seed.js &&
        node dist/index.js
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  app:
    build:
      context: .
      args:
        VITE_DEMO_MODE: "true"
    ports:
      - "50080:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:

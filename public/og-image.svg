<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060a10"/>
      <stop offset="40%" style="stop-color:#0A3D62;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0B0E14"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#D4A843;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#060a10;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Star dots -->
  <circle cx="120" cy="80" r="1.5" fill="#D4A843" opacity="0.4"/>
  <circle cx="340" cy="150" r="1" fill="#F0EDE5" opacity="0.3"/>
  <circle cx="800" cy="90" r="1.5" fill="#D4A843" opacity="0.35"/>
  <circle cx="950" cy="200" r="1" fill="#F0EDE5" opacity="0.25"/>
  <circle cx="1050" cy="120" r="1.5" fill="#D4A843" opacity="0.3"/>
  <circle cx="200" cy="400" r="1" fill="#F0EDE5" opacity="0.2"/>
  <circle cx="700" cy="500" r="1.5" fill="#D4A843" opacity="0.25"/>
  <circle cx="1100" cy="450" r="1" fill="#F0EDE5" opacity="0.3"/>
  <!-- Kowhaiwhai pattern line -->
  <path d="M0 580 C60 560, 120 600, 180 580 S300 560, 360 580 S480 600, 540 580 S660 560, 720 580 S840 600, 900 580 S1020 560, 1080 580 S1140 600, 1200 580" fill="none" stroke="#D4A843" stroke-width="1.5" opacity="0.2"/>
  <path d="M0 590 C60 610, 120 570, 180 590 S300 610, 360 590 S480 570, 540 590 S660 610, 720 590 S840 570, 900 590 S1020 610, 1080 590 S1140 570, 1200 590" fill="none" stroke="#C0392B" stroke-width="1" opacity="0.15"/>
  <!-- Koru logo -->
  <path d="M600 240C600 240 540 200 540 160C540 128 560 108 600 108C640 108 660 128 660 160C660 180 648 192 630 192C612 192 606 180 606 168C606 156 612 150 622 150C632 150 636 156 636 162" stroke="#D4A843" stroke-width="4" stroke-linecap="round" fill="none" transform="translate(-200, -10) scale(0.7)"/>
  <!-- Title -->
  <text x="440" y="200" font-family="Georgia, Playfair Display, serif" font-size="72" font-weight="800" fill="#F0EDE5">SkyHarmony</text>
  <!-- Tagline -->
  <text x="600" y="270" font-family="system-ui, sans-serif" font-size="22" fill="#D4A843" text-anchor="middle" letter-spacing="6" font-weight="500">THE SKY IS NO LONGER THE LIMIT</text>
  <!-- Subtitle -->
  <text x="600" y="330" font-family="system-ui, sans-serif" font-size="18" fill="#8CA0B3" text-anchor="middle">Cooperative drone fleet coordination for show operators</text>
  <!-- Feature pills -->
  <rect x="230" y="380" width="160" height="36" rx="18" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
  <text x="310" y="403" font-family="system-ui, sans-serif" font-size="13" fill="#D4A843" text-anchor="middle">500+ Drones</text>
  <rect x="420" y="380" width="160" height="36" rx="18" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
  <text x="500" y="403" font-family="system-ui, sans-serif" font-size="13" fill="#D4A843" text-anchor="middle">5 Operators</text>
  <rect x="610" y="380" width="180" height="36" rx="18" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
  <text x="700" y="403" font-family="system-ui, sans-serif" font-size="13" fill="#D4A843" text-anchor="middle">Real-Time Tracking</text>
  <rect x="820" y="380" width="160" height="36" rx="18" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
  <text x="900" y="403" font-family="system-ui, sans-serif" font-size="13" fill="#D4A843" text-anchor="middle">QR Check-In</text>
  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="3" fill="#D4A843" opacity="0.3"/>
  <!-- URL -->
  <text x="600" y="530" font-family="system-ui, sans-serif" font-size="16" fill="#8CA0B3" text-anchor="middle" opacity="0.6">skyharmony.us</text>
